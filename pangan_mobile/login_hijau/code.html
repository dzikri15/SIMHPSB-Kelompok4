<div class="absolute bottom-0 left-0 h-0.5 w-0 group-focus-within:w-full bg-primary transition-all duration-300"></div>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-xs font-bold uppercase tracking-widest text-outline" for="password">Kata Sandi</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#">Lupa Sandi?</a>
</div>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-high border-none rounded-xl focus:ring-0 focus:bg-surface-container-highest transition-colors duration-200 text-on-surface placeholder:text-outline/60" id="password" placeholder="••••••••" type="password"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 group-focus-within:w-full bg-primary transition-all duration-300"></div>
</div>
</div>
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary font-bold rounded-xl shadow-lg shadow-on-surface/5 hover:bg-primary-dim active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Masuk ke Akun</span>
<span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</div>

<div class="text-center">
